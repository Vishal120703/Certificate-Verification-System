<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Times New Roman", serif;
      background: white;
    }

    .certificate-wrapper {
      width: 1123px;       /* A4 Landscape width */
      height: 794px;       /* A4 Landscape height */
      margin: auto;
      padding: 50px;
      border: 15px solid #1e3a8a;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .top-section {
      text-align: center;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 20px;
      margin-bottom: 40px;
    }

    .name {
      font-size: 38px;
      font-weight: bold;
      margin: 20px 0;
    }

    .details {
      font-size: 22px;
      line-height: 1.8;
      margin-top: 20px;
    }

    .bottom-section {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 40px;
    }

    .signature {
      font-size: 18px;
      text-align: left;
    }

    .signature-line {
      margin-bottom: 5px;
      border-top: 1px solid black;
      width: 200px;
    }

    .qr img {
      width: 120px;
    }

    .certificate-id {
      text-align: center;
      font-size: 16px;
      margin-top: 20px;
    }

  </style>
</head>
<body>

  <div class="certificate-wrapper">

    <div class="top-section">
      <div class="title">INTERNSHIP CERTIFICATE</div>

      <div class="subtitle">
        This certificate is proudly presented to
      </div>

      <div class="name">{{studentName}}</div>

      <div class="details">
        For successfully completing internship in 
        <strong>{{internshipDomain}}</strong><br><br>
        From <strong>{{startDate}}</strong> To <strong>{{endDate}}</strong>
      </div>
    </div>

    <div>
      <div class="bottom-section">
        <div class="signature">
          <div class="signature-line"></div>
          Authorized Signature
        </div>

        <div class="qr">
          <img src="{{qrCode}}" />
        </div>
      </div>

      <div class="certificate-id">
        Certificate ID: {{certificateId}}
      </div>
    </div>

  </div>

</body>
</html>
